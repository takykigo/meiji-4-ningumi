<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伊勢旅行計画 - meiji-4-ningumi</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background-color: #f4f4f4; color: #333; }
        h1 { font-size: 1.5rem; color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 5px; }
        h2 { font-size: 1.2rem; margin-top: 25px; color: #e67e22; }
        .map-container { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        img { width: 100%; height: auto; border-radius: 4px; display: block; }
        .spot-list { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .spot-list ul { padding-left: 20px; }
        .spot-list li { margin-bottom: 8px; }
        .highlight-station { font-weight: bold; color: #d35400; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 30px 0; }
    </style>
</head>
<body>

    <h1>伊勢旅行計画</h1>

    <div class="spot-list">
        <h2>主要地点</h2>
        <ul>
            <li>出発地：金沢駅</li>
            <li>集合場所：名古屋駅</li>
            <li>宿泊候補A：大江戸温泉物語Premium 伊勢志摩</li>
            <li>宿泊候補B：大江戸温泉物語Premium 鳥羽彩朝楽</li>
            <li>観光：二見興玉神社、外宮、内宮、他別宮</li>
            <li class="highlight-station">終了地点：伊勢市駅（解散）</li>
        </ul>
    </div>

    <div class="map-container">
        <h2>Map①：全体行程（金沢・名古屋・伊勢）</h2>
        <img src="スライド1.JPG" alt="全体マップ">
    </div>

    <hr>

    <div class="map-container">
        <h2>Map②：宿泊候補・広域観光</h2>
        <img src="スライド2.JPG" alt="広域マップ">
    </div>

    <hr>

    <div class="map-container">
        <h2>Map③：伊勢市街地詳細（解散地点確認）</h2>
        <img src="スライド3.JPG" alt="詳細マップ">
    </div>

    <footer style="text-align: center; font-size: 0.8rem; color: #777; margin-top: 40px;">
        &copy; 2026 meiji-4-ningumi 伊勢旅行プロジェクト
    </footer>

</body>
</html>
